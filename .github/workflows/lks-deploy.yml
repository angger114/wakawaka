name: LKS Deploy Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  # ========== MAIN DEPLOYMENT JOB ==========
  deploy-frontend:
    name: Deploy Frontend to AWS Amplify
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 3. Validate AWS Credentials
      - name: Validate AWS Credentials
        run: |
          echo "Validating AWS credentials..."
          aws sts get-caller-identity
          echo "✅ AWS credentials validated"

      # 4. Validate Frontend Files
      - name: Validate Frontend Files
        run: |
          echo "Validating frontend files..."

          if [ ! -f "frontend/index.html" ]; then
            echo "❌ index.html not found"
            exit 1
          fi
          echo "✅ index.html found"

          if [ ! -f "frontend/app.js" ]; then
            echo "❌ app.js not found"
            exit 1
          fi
          echo "✅ app.js found"

          if [ ! -f "amplify.yml" ]; then
            echo "❌ amplify.yml not found"
            exit 1
          fi
          echo "✅ amplify.yml found"

          echo "✅ All frontend files validated"

      # 5. Verify Amplify App Exists
      - name: Check Amplify App Exists
        id: check-app
        run: |
          echo "Checking if Amplify app exists..."

          APP_ID=$(aws amplify list-apps \
            --query "apps[?name=='lks-amplify-order-app'].appId | [0]" \
            --output text)

          if [ -z "$APP_ID" ] || [ "$APP_ID" = "None" ]; then
            echo "❌ Amplify app not found"
            exit 1
          fi

          echo "✅ Amplify app found: $APP_ID"
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
          echo "app_exists=true" >> $GITHUB_OUTPUT

      # 6. Trigger Amplify Deployment
      - name: Trigger Amplify Deployment
        id: trigger-amplify
        if: steps.check-app.outputs.app_exists == 'true'
        run: |
          echo "Triggering AWS Amplify build and deployment..."

          JOB_ID=$(aws amplify start-job \
            --app-id ${{ steps.check-app.outputs.app_id }} \
            --branch-name master \
            --job-type RELEASE \
            --query 'jobSummary.jobId' \
            --output text)

          echo "✅ Amplify job started: $JOB_ID"
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT

      # 7. Monitor Deployment Status
      - name: Monitor Deployment Status
        id: monitor
        if: steps.check-app.outputs.app_exists == 'true'
        run: |
          echo "Monitoring deployment..."

          MAX_WAIT=600
          ELAPSED=0
          STATUS="PENDING"

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws amplify get-job \
              --app-id ${{ steps.check-app.outputs.app_id }} \
              --branch-name master \
              --job-id ${{ steps.trigger-amplify.outputs.job_id }} \
              --query 'job.summary.status' \
              --output text 2>/dev/null || echo "PENDING")

            echo "Status: $STATUS (${ELAPSED}s elapsed)"

            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Deployment succeeded!"
              echo "deploy_status=success" >> $GITHUB_OUTPUT
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Deployment failed: $STATUS"
              echo "deploy_status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi

            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "⚠️ Deployment timed out"
            echo "deploy_status=timeout" >> $GITHUB_OUTPUT
          fi

      # 8. Get Application URL
      - name: Get Application URL
        id: get-url
        if: steps.monitor.outputs.deploy_status == 'success'
        run: |
          APP_DOMAIN=$(aws amplify get-app \
            --app-id ${{ steps.check-app.outputs.app_id }} \
            --query 'app.defaultDomain' \
            --output text)

          APP_URL="https://master.${APP_DOMAIN}"
          echo "🌐 Application URL: $APP_URL"
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
          echo "FINAL_APP_URL=$APP_URL" >> $GITHUB_ENV

      # 9. Deployment Summary
      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.monitor.outputs.deploy_status || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App URL | ${{ steps.get-url.outputs.app_url || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Amplify App ID | ${{ steps.check-app.outputs.app_id || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Job ID | ${{ steps.trigger-amplify.outputs.job_id || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY

  # ========== NOTIFY JOB ==========
  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: always() && github.ref == 'refs/heads/master'

    steps:
      # 1. Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 2. Determine Deployment Status
      - name: Determine Deployment Status
        id: status
        run: |
          if [ "${{ needs.deploy-frontend.result }}" = "success" ]; then
            echo "status=SUCCESS" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      # 3. Send SNS Notification
      - name: Send SNS Notification
        run: |
          SNS_TOPIC_ARN=$(aws sns list-topics \
            --query "Topics[?contains(TopicArn, 'lks')].TopicArn | [0]" \
            --output text)

          if [ -z "$SNS_TOPIC_ARN" ] || [ "$SNS_TOPIC_ARN" = "None" ]; then
            echo "⚠️ SNS topic not found, using first available topic"
            SNS_TOPIC_ARN=$(aws sns list-topics \
              --query "Topics[0].TopicArn" \
              --output text)
          fi

          echo "Sending notification to: $SNS_TOPIC_ARN"

          aws sns publish \
            --topic-arn $SNS_TOPIC_ARN \
            --subject "${{ steps.status.outputs.emoji }} LKS Frontend Deployment - ${{ steps.status.outputs.status }}" \
            --message "
          ==========================================
          LKS Order Management - Deployment Notification
          ==========================================
          Status  : ${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.status }}
          Commit  : ${{ github.sha }}
          Author  : ${{ github.actor }}
          Branch  : ${{ github.ref_name }}
          Event   : ${{ github.event_name }}
          Run URL : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ==========================================
          "

          echo "✅ SNS notification sent"